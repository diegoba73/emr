# Smoke mínimo SYNESIS EMR/LIMS — backend (SQLite in-memory) + frontend (Jest + build).
# PostgreSQL: no requerido; smoke focal documentado como manual/opcional en DOC_TESTS.md.

name: Smoke

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: backend-checks
    runs-on: ubuntu-latest
    env:
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Pytest smoke — usuarios + auditoria
        run: pytest usuarios/tests/ auditoria/tests/ -q

      - name: Pytest smoke — filtro microbiologia estudio_id
        run: pytest laboratorio/tests/test_microbiologia_estudio_id_filter.py -q

  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Jest suite global
        run: CI=true npm test -- --watchAll=false

      - name: Production build
        run: CI=false npm run build
