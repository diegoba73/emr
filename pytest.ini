[pytest]
DJANGO_SETTINGS_MODULE = synesis.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
# `pythonpath = .` permite imports del proyecto; `--import-mode=importlib` es el modo usado
# en CI/local para esta suite (compatible con el comando que ya funciona).
pythonpath = .
addopts = --tb=short --strict-markers --import-mode=importlib
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests


