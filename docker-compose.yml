# Stack de desarrollo EMR — BD única en contenedor emr_postgres.
# Desarrollo recomendado (híbrido): ./emrctl up  →  runserver + npm en terminal.
# Stack completo en Docker: ./emrctl up --docker
name: emr

services:
  db:
    image: postgres:15-alpine
    container_name: emr_postgres
    labels:
      com.emr.service: database
      com.emr.description: PostgreSQL (synesis_db)
    environment:
      POSTGRES_DB: synesis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synesis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: emr_backend
    labels:
      com.emr.service: backend
      com.emr.description: Django API :8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_RUNTIME: runserver
      DJANGO_SECRET_KEY: dev_secret_key_change_me
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: synesis_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      RUN_MIGRATIONS: "true"
      RUN_SEED: "${RUN_SEED:-false}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: emr_frontend
    labels:
      com.emr.service: frontend
      com.emr.description: React UI :3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      HOST: "0.0.0.0"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
