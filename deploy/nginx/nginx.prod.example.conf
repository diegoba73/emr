# SYNESIS EMR/LIMS — plantilla Nginx producción/staging (NO usar sin editar).
#
# - Proxy reverso hacia Gunicorn/Django (servicio Docker: backend:8000).
# - TLS: terminar en este Nginx, en balanceador externo (ALB/Cloud LB) o ambos.
# - No commitear certificados reales ni dominios productivos.
#
# Variables Django relacionadas (ver .env.production.example):
#   DJANGO_ALLOWED_HOSTS          — debe incluir el host público y DJANGO_HEALTHCHECK_HOST
#   DJANGO_CSRF_TRUSTED_ORIGINS   — orígenes HTTPS del frontend/API
#   DJANGO_SECURE_SSL_REDIRECT    — True en prod (redirect si request no se ve como HTTPS)
#   DJANGO_USE_PROXY_SSL_HEADER   — True; Django usa HTTP_X_FORWARDED_PROTO
#   DJANGO_HEALTHCHECK_HOST       — host interno del healthcheck del contenedor backend

upstream django_backend {
    server backend:8000;
    keepalive 16;
}

# Si TLS termina en un balanceador upstream, propagar X-Forwarded-Proto hacia Django.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name example.com;

    # Redirigir HTTP→HTTPS solo si TLS termina en este Nginx (montar certs reales fuera del repo):
    # return 301 https://$host$request_uri;

    client_max_body_size 25m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS: habilitar solo con TLS real end-to-end validado (no en HTTP plano):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # No servir /media/ como estática pública (PHI/archivos clínicos — usar endpoints protegidos).
    location /media/ {
        deny all;
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Placeholder ACME / certbot (montar /var/www/certbot si aplica; sin certificados en repo).
    location /.well-known/ {
        allow all;
        root /var/www/certbot;
    }
}

