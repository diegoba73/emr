# SYNESIS EMR/LIMS — plantilla Docker Compose producción/staging (NO lista sin editar).
# No commitear secretos reales. Usar gestor de secretos o variables del orquestador.
#
# Uso orientativo:
#   export DJANGO_SECRET_KEY='...'  # generar con get_random_secret_key()
#   export DJANGO_ALLOWED_HOSTS='example.com,localhost'
#   export DJANGO_CORS_ALLOWED_ORIGINS='https://app.example.com'
#   export DJANGO_CSRF_TRUSTED_ORIGINS='https://app.example.com'
#   export DJANGO_HEALTHCHECK_HOST='localhost'
#   docker compose -f docker-compose.prod.example.yml up -d
#
# PROD-3: Nginx actúa como reverse proxy; Gunicorn solo en red interna.
# PROD-4: MEDIA_ROOT solo en backend (volumen interno opcional); Nginx NO monta ni sirve /media/.

services:
  db:
    image: postgres:15-alpine
    container_name: emr_postgres_prod
    environment:
      POSTGRES_DB: synesis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synesis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: emr_backend_prod
    expose:
      - "8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_RUNTIME: "gunicorn"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY requerido}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS requerido}
      DJANGO_HEALTHCHECK_HOST: ${DJANGO_HEALTHCHECK_HOST:-localhost}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:?DJANGO_CORS_ALLOWED_ORIGINS requerido}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:?DJANGO_CSRF_TRUSTED_ORIGINS requerido}
      DJANGO_SESSION_COOKIE_SECURE: "true"
      DJANGO_CSRF_COOKIE_SECURE: "true"
      DJANGO_SECURE_SSL_REDIRECT: "true"
      DJANGO_USE_PROXY_SSL_HEADER: "true"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: synesis_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
      DB_HOST: db
      DB_PORT: "5432"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    # PROD-4: volumen persistente solo en backend (red interna). Nunca montar media en nginx.
    # volumes:
    #   - media_data_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; host=os.getenv('DJANGO_HEALTHCHECK_HOST', 'localhost'); req=urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'Host': host, 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: emr_nginx_prod
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.prod.example.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_prod:
  # media_data_prod:  # PROD-4 — descomentar junto al volumen del backend si aplica
